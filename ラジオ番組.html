<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Radio</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: -apple-system;
  color: white;
  transition: background 1s ease;
}
button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  border-radius: 20px;
}
</style>
</head>
<body>

<h1 id="title">Tonight's Session</h1>
<button onclick="startShow()">Start 25min</button>

<script>
function setBackground() {
  const hour = new Date().getHours();
  if (hour >= 18 || hour <= 4) {
    document.body.style.background = "#2c1b47"; // 夜紫
  } else {
    document.body.style.background = "#5fa8d3"; // 空色
  }
}

function startShow() {
  const utterance = new SpeechSynthesisUtterance(
    "今夜は、25分だけお付き合いください。ではどうぞ。"
  );
  utterance.rate = 0.85;
  speechSynthesis.speak(utterance);
}

setBackground();
</script>

</body>
</html>
